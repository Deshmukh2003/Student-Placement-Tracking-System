<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<style>

/* ===== PAGE BACKGROUND ===== */
body{
    margin:0;
    padding:0;
    font-family:'Segoe UI', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* IMAGE + OVERLAY */
    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1470&auto=format&fit=crop");

    background-size:cover;
    background-position:center;

    animation:bgMove 12s ease-in-out infinite;
}

/* BACKGROUND ANIMATION */
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== REGISTER BOX ===== */
.register-box{
    background:rgba(255,255,255,0.96);
    padding:25px;
    border-radius:15px;
    width:450px;
    max-height:90vh;
    overflow-y:auto;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);

    animation:fadeUp 1s ease;
}

/* FORM ENTRY ANIMATION */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px) scale(0.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* TITLE */
.register-box h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:15px;
    font-weight:800;
}

/* LABEL */
label{
    font-size:14px;
    font-weight:600;
}

/* INPUTS + SELECT */
.register-box input,
.register-box select{
    width:100%;
    padding:10px;
    margin-top:6px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    transition:0.3s;
}

/* INPUT FOCUS */
.register-box input:focus,
.register-box select:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,0.4);
}

/* BUTTON */
.register-btn{
    width:100%;
    background:linear-gradient(45deg,#0d6efd,#6610f2);
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

/* BUTTON HOVER */
.register-btn:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* LOGIN LINK */
.login-text{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

.login-text a{
    color:#0d6efd;
    font-weight:bold;
    text-decoration:none;
}

.login-text a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="register-box">

    <h2>Student Registration</h2>

    <form name="frm" action="demopp" method="Post" >

        <label>Name</label>
        <input type="text" name="name" required value="">

        <label>Email</label>
        <input type="email" name="email" required value="">

        <label>Password</label>
        <input type="password" name="password" required value="">

        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" required value="">

        <label>Mobile Number</label>
        <input type="text" name="mobile" required value="">

        <label>Gender</label>
        <select name="gender" required >
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Qualification</label>
        <input type="text" name="qualification" required value=""> 

        <label>Branch</label>
        <input type="text" name="branch" required value="">

        <label>Passout Year</label>
        <select name="passoutYear" required>
            <option value="">Select Year</option>
            <option>2024</option>
            <option>2025</option>
            <option>2026</option>
            <option>2027</option>
        </select>

        <label>Skills</label>
        <input type="text" name="skills" required value="">

        

        <button type="submit" class="register-btn">
            Register
        </button>

    </form>

    <div class="login-text">
        Already registered?
        <a href="student-login.html">Login here</a>
    </div>

</div>

</body>

</html>
