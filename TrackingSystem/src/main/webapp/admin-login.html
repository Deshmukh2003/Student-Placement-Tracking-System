<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== BACKGROUND IMAGE + ANIMATION ===== */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI;

    background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=1470&auto=format&fit=crop");

    background-size:cover;
    background-position:center;
    animation: bgZoom 12s ease-in-out infinite;
}

/* subtle zoom effect */
@keyframes bgZoom{
    0%{background-size:100%;}
    50%{background-size:110%;}
    100%{background-size:100%;}
}

/* ===== LOGIN BOX ANIMATION ===== */
.login-box{
    background:white;
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);

    animation: fadeUp 1s ease;
}

/* pop animation */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px) scale(0.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    font-weight:bold;
    color:#1e3a8a;
}

/* ===== INPUT FOCUS EFFECT ===== */
.form-control{
    transition:0.3s;
}

.form-control:focus{
    box-shadow:0 0 8px rgba(30,58,138,0.5);
    border-color:#1e3a8a;
}

/* ===== BUTTON ANIMATION ===== */
.btn-login{
    width:100%;
    background:#1e3a8a;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    transition:0.3s;
}

.btn-login:hover{
    background:#0f172a;
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <form action="Admin" method="post" name="frm">

        <div class="mb-3">
            <label>User ID</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn-login"  >
		Login        
		</button>

    </form>

</div>

</body>

</html>
